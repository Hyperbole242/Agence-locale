<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Contact - Agence Digitale</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <nav class="navbar">
      <div class="logo">Agence Digitale</div>
      <ul class="nav-links">
        <li><a href="index.html">Accueil</a></li>
        <li><a href="about.html">À propos</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="projets.html">Projets</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
        <li><a href="mentions.html">Mentions légales</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="contact-page">
      <h1>Contactez‑nous</h1>
      <form class="contact-form">
        <div class="input-group">
          <i class="fas fa-user"></i>
          <input type="text" placeholder="Votre nom" required>
        </div>
        <div class="input-group">
          <i class="fas fa-envelope"></i>
          <input type="email" placeholder="Votre email" required>
        </div>
        <div class="input-group">
          <i class="fas fa-comment"></i>
          <textarea rows="5" placeholder="Votre message" required></textarea>
        </div>
        <button type="submit" class="cta-btn">Envoyer</button>
      </form>
    </section>
  </main>

  <footer>
    <p>© 2026 Agence Digitale Locale</p>
  </footer>

</body>
</html>
